name: Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build signed APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Decode release keystore
        working-directory: android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.jks
          echo "ANDROID_KEYSTORE_PATH=$GITHUB_WORKSPACE/android/release.jks" >> "$GITHUB_ENV"

      - name: Build release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon --console=plain assembleRelease

      - name: Compute SHA-256
        id: sha
        working-directory: android
        run: |
          apk="app/build/outputs/apk/release/app-release.apk"
          sha=$(sha256sum "$apk" | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
          echo "apk=$apk" >> "$GITHUB_OUTPUT"

      - name: Rename APK with version
        id: rename
        working-directory: android
        run: |
          version="${GITHUB_REF_NAME#v}"
          dest="OpenAVCPanel-$version.apk"
          cp "${{ steps.sha.outputs.apk }}" "$dest"
          echo "dest=$dest" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: OpenAVC Panel ${{ steps.rename.outputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          files: android/${{ steps.rename.outputs.dest }}
          body: |
            OpenAVC Panel ${{ steps.rename.outputs.version }} for Android.

            **Signed APK SHA-256:** `${{ steps.sha.outputs.sha256 }}`

            ## Install

            Download the APK and install on your Android tablet one of two ways:

            1. **ADB (recommended):** `adb install OpenAVCPanel-${{ steps.rename.outputs.version }}.apk`
            2. **Sideload:** copy the APK to the tablet, tap it in Files, allow "Install unknown apps" for your file manager.

            ## Android Enterprise Provisioning

            For bulk kiosk setup (QR provisioning), the SHA-256 above is the checksum the Android Enterprise provisioning tool needs. See the [Android kiosk setup guide](https://docs.openavc.com/panel-app-kiosk-android) for the full walkthrough.

            ## System Requirements

            Android 8.0 (API 26) or newer. An OpenAVC server reachable on the same network.
